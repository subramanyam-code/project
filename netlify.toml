# ─────────────────────────────────────────────
#  Netlify config for TSPM Frontend (Next.js 14)
# ─────────────────────────────────────────────

[build]
  base    = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # On Netlify, frontend calls go through the /api/* proxy below (no direct backend URL needed)
  # Set your actual Render backend URL here after deploying the backend
  NEXT_PUBLIC_API_URL = ""
  NEXT_PUBLIC_APP_NAME = "TeamStatus"

# Next.js App Router — Netlify handles SSR via the plugin automatically
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Headers ──────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects ────────────────────────────────
# Root → let Next.js page.tsx handle the redirect (it checks auth state)
# Do NOT hard-redirect here — the auth guard in page.tsx sends to /auth/login or /dashboard

# Proxy all /api/* calls to the backend on Render
# Replace the `to` URL with your actual Render backend URL after deploy
[[redirects]]
  from   = "/api/*"
  to     = "https://project-1-7kvm.onrender.com/api/:splat"
  status = 200
  force  = true

  [redirects.headers]
    X-Forwarded-Host = ":host"
